server:
  port: ${PS_SERVER_PORT:8081}

spring:
  application:
    name: prospecting-service
  datasource:
    url: jdbc:h2:mem:prospectingdb
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
