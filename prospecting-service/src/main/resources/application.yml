server:
  port: ${PS_SERVER_PORT:8081}

spring:
  application:
    name: prospecting-service
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  datasource:
    url: ${VA_DB_URL}
    username: ${VA_DB_USERNAME}
    password: ${VA_DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

prospecting:
  schedule:
    cron: "0 0 2 * * ?"  # Executa diariamente as 02:00

brasilapi:
  base-url: "https://brasilapi.com.br"

