version: '3.3'

services:
  virtual-assistant:
    image: virtual-assistant:latest
    build: .
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=${SPRING_PROFILES_ACTIVE}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
    depends_on:
      - db
      - redis

  db:
    image: pgvector/pgvector:pg18
    container_name: virtual-assistant-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ragdb
      POSTGRES_USER: ${VA_DB_USERNAME}
      POSTGRES_PASSWORD: ${VA_DB_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${VA_DB_USERNAME} -d ragdb" ]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis/redis-stack:latest
    container_name: virtual-assistant-redis
    restart: unless-stopped
    ports:
      - "6379:6379" # porta do Redis
      - "8001:8001" # RedisInsight (UI web)
    volumes:
      - redisdata:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5

  ollama:
    image: ollama/ollama:latest
    container_name: virtual-assistant-ollama
    restart: unless-stopped
    ports:
      - "11435:11434"
    volumes:
      - ollama:/root/.ollama
    # sobe o servidor, espera ficar pronto, garante o bge-m3 e segue servindo
    entrypoint: [ "/bin/sh", "-c" ]
    command:
      - |
        ollama serve &
        pid=$$!
        until ollama list >/dev/null 2>&1; do sleep 1; done
        ollama pull bge-m3
        wait $$pid
    healthcheck:
      # so fica saudavel quando o modelo ja esta disponivel (evita race no ingest)
      test: [ "CMD-SHELL", "ollama list 2>/dev/null | grep -q bge-m3 || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 300s

volumes:
  pgdata:
  redisdata:
  ollama:
