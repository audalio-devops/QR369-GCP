spring:
  datasource:
    url: ${VA_DB_URL:jdbc:postgresql://localhost:5432/ragdb}
    username: ${VA_DB_USERNAME:postgres}
    password: ${VA_DB_PASSWORD:postgres}
  ai:
    vectorstore:
      pgvector:
        initialize-schema: true        # cria a extensao, a tabela e o indice no primeiro start
        index-type: HNSW               # indice de busca aproximada de vizinhos
        distance-type: COSINE_DISTANCE # distancia que casa com embeddings de sentenca
        table-name: vector_store
    chat:
      memory:
        redis:
          host: ${VA_REDIS_HOST:localhost}
          port: ${VA_REDIS_PORT:6379}
          time-to-live: PT30M          # a conversa expira apos 30 min de inatividade

# bloco proprio do projeto (nao e do framework)
app:
  rag:
    top-k: 5                           # quantos chunks o QuestionAnswerAdvisor recupera
    similarity-threshold: 0.2          # piso de similaridade do retrieval
  memory:
    max-messages: 20                   # tamanho da janela do MessageWindowChatMemory
  zapi:
    api-url: "https://api.z-api.io/instances/3F54953CDE8E5158EB4A26931B1E6087/token/7DFF6C879B7B5B0058AB4B75"
    send-message-endpoint: "/send-text"

# nivel DEBUG apenas para o advisor que loga prompt (IDA) e resposta (VOLTA)
logging:
  level:
    br.com.ia369.virtual_assistant.chat.PromptLoggingAdvisor: DEBUG
