services:

  # ── Aplicações ─────────────────────────────────────────────────────────────

  virtual-assistant:
    image: virtual-assistant:latest
    build: ./virtual-assistant
    container_name: virtual-assistant-app
    ports:
      - "${VA_SERVER_PORT:-8080}:${VA_SERVER_PORT:-8080}"
    environment:
      VA_SERVER_PORT: ${VA_SERVER_PORT:-8080}
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      SPRING_AI_OLLAMA_BASE_URL: ${SPRING_AI_OLLAMA_BASE_URL}
      VA_DB_URL: ${VA_DB_URL}
      VA_DB_USERNAME: ${VA_DB_USERNAME}
      VA_DB_PASSWORD: ${VA_DB_PASSWORD}
      VA_REDIS_HOST: ${VA_REDIS_HOST}
      VA_REDIS_PORT: ${VA_REDIS_PORT}
      LOGIN_USR: ${LOGIN_USR}
      LOGIN_PWD: ${LOGIN_PWD}
      APP_PROSPECTING_BASE_URL: http://prospecting-service:8081
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      ollama:
        condition: service_healthy
    restart: unless-stopped

  prospecting-service:
    image: prospecting-service:latest
    build: ./prospecting-service
    container_name: prospecting-service-app
    ports:
      - "${PS_SERVER_PORT:-8081}:${PS_SERVER_PORT:-8081}"
    environment:
      PS_SERVER_PORT: ${PS_SERVER_PORT:-8081}
      SPRING_DATASOURCE_URL: ${VA_DB_URL}
      SPRING_DATASOURCE_USERNAME: ${VA_DB_USERNAME}
      SPRING_DATASOURCE_PASSWORD: ${VA_DB_PASSWORD}
      BRASILAPI_BASE_URL: ${BRASILAPI_BASE_URL:-https://brasilapi.com.br}
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  # ── Infraestrutura ──────────────────────────────────────────────────────────

  db:
    image: pgvector/pgvector:pg16
    container_name: qr369-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ragdb
      POSTGRES_USER: ${VA_DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${VA_DB_PASSWORD:-postgres}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${VA_DB_USERNAME:-postgres} -d ragdb" ]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis/redis-stack:latest
    container_name: qr369-redis
    restart: unless-stopped
    ports:
      - "${VA_REDIS_PORT:-6379}:6379"
      - "8001:8001" # RedisInsight (UI web)
    volumes:
      - redisdata:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5

  ollama:
    image: ollama/ollama:latest
    container_name: qr369-ollama
    restart: unless-stopped
    ports:
      - "11435:11434"
    volumes:
      - ollama:/root/.ollama
    entrypoint: [ "/bin/sh", "-c" ]
    command:
      - |
        ollama serve &
        pid=$$!
        until ollama list > /dev/null 2>&1; do sleep 1; done
        ollama pull bge-m3
        wait $$pid
    healthcheck:
      test: [ "CMD-SHELL", "ollama list 2>/dev/null | grep -q bge-m3 || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 300s

volumes:
  pgdata:
  redisdata:
  ollama:

